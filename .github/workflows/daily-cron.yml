name: JobDigger Daily Automation

on:
  # CRON DISABLED during manual rollout phase. Re-enable after 3 successful manual runs.
  # schedule:
  #   - cron: "0 7 * * *"  # 07:00 UTC daily
  workflow_dispatch:
    inputs:
      lead_batch_size:
        description: "LEAD_BATCH_SIZE (30 = dagbatch; ~25 min runtime)"
        required: false
        default: "30"
      lead_offset:
        description: "LEAD_OFFSET (start-index; verhoog per batch om door de lijst te lopen)"
        required: false
        default: "0"

concurrency:
  group: jobdigger-daily
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install WeasyPrint system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangoft2-1.0-0 libharfbuzz0b \
            libfontconfig1 libcairo2

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Fetch JobDigger Excel from Supabase Storage
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/fetch_jobdigger_input.py

      - name: Prepare input data (Excel preferred, JSON fallback)
        run: |
          mkdir -p data
          if [ -f data/daily_vacancies.xlsx ]; then
            echo "Using JobDigger Excel input: data/daily_vacancies.xlsx"
          elif [ -f data/daily_vacancies.json ]; then
            echo "Using existing JSON input: data/daily_vacancies.json"
          else
            cp test/fixtures/sample_vacancies.json data/daily_vacancies.json
            echo "Using test fixture (no real JobDigger input found)"
          fi

      - name: Run daily automation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL || 'claude-opus-4-7' }}
          LEMLIST_API_KEY: ${{ secrets.LEMLIST_API_KEY }}
          LEMLIST_CAMPAIGN_ID: ${{ secrets.LEMLIST_CAMPAIGN_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_BUCKET: ${{ vars.SUPABASE_BUCKET || 'jobdigger-pdfs' }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          LEAD_BATCH_SIZE: ${{ github.event.inputs.lead_batch_size || vars.LEAD_BATCH_SIZE || '3' }}
          LEAD_OFFSET: ${{ github.event.inputs.lead_offset || '0' }}
          CANARY_EMAIL: ${{ vars.CANARY_EMAIL || '' }}
          MIN_ICP_SCORE: ${{ vars.MIN_ICP_SCORE || '65' }}
        run: |
          python scripts/daily_automation.py 2>&1 | tee /tmp/run_output.log
          # Extract key metrics for Slack
          grep -E "Loaded|ICP qualified|Dedup|leads OK|FAILED" /tmp/run_output.log > /tmp/run_summary.log || true
          echo "RUN_SUMMARY<<EOF" >> $GITHUB_ENV
          cat /tmp/run_summary.log >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Upload logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-run-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7

      - name: Notify Slack on failure
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\":rotating_light: JobDigger daily run FAILED — ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "$SLACK_WEBHOOK_URL"

      - name: Notify Slack on success
        if: success() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          SUMMARY=$(echo "${RUN_SUMMARY:-(no summary)}" | head -10 | sed 's/"/\\"/g' | awk '{printf "%s\\n", $0}')
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\":white_check_mark: *JobDigger V3 run OK*\n\`\`\`${SUMMARY}\`\`\`\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>\"}" \
            "$SLACK_WEBHOOK_URL"
